# Render Blueprint — one service: the FastAPI backend, built from the Dockerfile.
# In the Render dashboard: New +  ->  Blueprint  ->  pick this repo. It reads this file, then you
# fill the secret env vars (marked sync:false) once. Render injects $PORT; gunicorn_conf.py binds it.
#
# QUICK PRIVATE-DEMO MODE: ENVIRONMENT=development keeps the passwordless /auth/dev-login on and lets
# CORS stay "*", so teammates can log in with no email setup. Flip ENVIRONMENT=production later (then
# you MUST set DEV_MODE=false, an explicit CORS_ORIGINS, and a strong JWT_SECRET — the app fail-fasts
# otherwise).
services:
  - type: web
    name: vettalume-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: ENVIRONMENT
        value: development
      - key: DEV_MODE
        value: "true"
      # Free tier is single-CPU with ~512MB RAM: run ONE worker. (Multiple workers also race to seed
      # the DB at boot unless DATABASE_URL is Postgres, which serialises them via an advisory lock —
      # one worker sidesteps that entirely. Bump this only on a paid multi-core instance.)
      - key: WEB_CONCURRENCY
        value: "1"
      # Secrets — set these in the Render dashboard (they are NOT stored in git):
      # DATABASE_URL is REQUIRED — it MUST be your Neon Postgres URL (postgresql://...neon.tech...).
      # If it is blank/unset the app silently falls back to SQLite and the deploy fails.
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET        # any long random string
        sync: false
      - key: RESEND_API_KEY    # optional in dev mode (dev-login needs no email)
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: GOOGLE_CLIENT_ID  # optional; only needed for Google sign-in
        sync: false
